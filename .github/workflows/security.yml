name: Security scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily at 03:17 UTC
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run email-template escape regression tests
        run: npx vitest run src/lib/htmlEscape.test.ts

      - name: Run security scan (npm audit + vitest)
        run: npx tsx scripts/run-security-scan.ts